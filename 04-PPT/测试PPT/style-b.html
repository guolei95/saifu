<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style B: Electric Studio — 赛赋</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* === CSS CUSTOM PROPERTIES === */
:root {
    --bg-dark: #0a0a0a;
    --bg-white: #ffffff;
    --accent: #4361ee;
    --accent-bar: #4361ee;
    --text-dark: #0a0a0a;
    --text-light: #ffffff;
    --text-muted: #666;
    --font-body: 'Manrope', sans-serif;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}

/* === VIEWPORT FITTING === */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow-x: hidden; }
html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }

.slide {
    width: 100vw; height: 100vh; height: 100dvh;
    overflow: hidden; scroll-snap-align: start;
    display: flex; flex-direction: column; position: relative;
}

/* === STYLE B: ELECTRIC STUDIO === */
.slide {
    font-family: var(--font-body);
}

/* Split panel layout */
.panel-top {
    flex: 45;
    background: var(--bg-white);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
}
.panel-bottom {
    flex: 55;
    background: var(--bg-dark);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
}

/* Accent bar */
.panel-top::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: clamp(4px, 0.5vw, 8px);
    background: var(--accent);
    transform: scaleY(0); transform-origin: top;
    transition: transform 0.8s var(--ease-out-expo);
    transition-delay: 0.4s;
}
.slide.visible .panel-top::after {
    transform: scaleY(1);
}

/* Title area */
.title-block {
    text-align: center; padding: clamp(1rem, 3vw, 3rem);
}
.main-title {
    font-family: var(--font-body);
    font-weight: 800;
    font-size: clamp(2.5rem, 8vw, 6rem);
    color: var(--text-dark);
    line-height: 1.1;
    letter-spacing: -0.02em;
}
.title-cn {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: clamp(1rem, 2.5vw, 1.75rem);
    color: var(--text-muted);
    margin-top: clamp(0.3rem, 1vw, 1rem);
}

/* Bottom content */
.bottom-content {
    text-align: center; padding: clamp(1rem, 3vw, 3rem);
    color: var(--text-light);
}
.platform-desc {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: clamp(0.9rem, 1.8vw, 1.4rem);
    color: #aaa;
    margin-bottom: clamp(1rem, 2vw, 2rem);
    letter-spacing: 0.05em;
}
.quote-text {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: clamp(0.8rem, 1.3vw, 1.1rem);
    color: #666;
    font-style: italic;
    max-width: min(80vw, 550px);
    line-height: 1.6;
}

/* Decorative dot */
.dot-accent {
    position: absolute;
    width: clamp(8px, 1.5vw, 16px);
    height: clamp(8px, 1.5vw, 16px);
    background: var(--accent);
    border-radius: 50%;
}

/* === ANIMATIONS === */
.reveal { opacity: 0; transform: translateY(25px); transition: opacity 0.6s var(--ease-out-expo), transform 0.6s var(--ease-out-expo); }
.slide.visible .reveal { opacity: 1; transform: translateY(0); }
.reveal:nth-child(1) { transition-delay: 0.1s; }
.reveal:nth-child(2) { transition-delay: 0.25s; }
.reveal:nth-child(3) { transition-delay: 0.4s; }

/* === REDUCED MOTION === */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; }
    html { scroll-behavior: auto; }
}

/* === SHORT VIEWPORT === */
@media (max-height: 600px) {
    .panel-top { flex: 40; }
    .panel-bottom { flex: 60; }
}
</style>
</head>
<body>

<section class="slide">
    <div class="panel-top">
        <div class="title-block">
            <h1 class="main-title reveal">赛赋 SaiFu</h1>
            <p class="title-cn reveal">AI 驱动的竞赛全流程辅助平台</p>
        </div>
    </div>
    <div class="panel-bottom">
        <div class="bottom-content">
            <p class="platform-desc reveal">让信息不再是门槛</p>
            <p class="quote-text reveal">赛者非异也，善假于赋也。</p>
        </div>
    </div>
</section>

<script>
const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.3 });
document.querySelectorAll('.slide').forEach(s => observer.observe(s));
document.querySelector('.slide').classList.add('visible');
</script>
</body>
</html>
