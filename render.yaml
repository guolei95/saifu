services:
  - type: web
    name: saifu-backend
    env: python
    region: singapore
    plan: starter
    rootDir: saifu/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: "*"
