name: 防止Render休眠

on:
  schedule:
    - cron: '*/10 * * * *'   # 每10分钟执行一次
  workflow_dispatch:           # 允许手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://你的后端地址.onrender.com/api/health || echo "ping failed"
